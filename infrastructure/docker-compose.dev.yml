version: '3.8'

services:
  # ==================== DATABASES ====================
  # PostgreSQL for Auth Service
  postgres-auth:
    image: postgres:15-alpine
    container_name: postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
    ports:
      - '5432:5432'
    volumes:
      - auth_db_volume:/var/lib/postgresql/data
    networks:
      - microservices
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U auth_user -d auth_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL for Account Service
  postgres-account:
    image: postgres:15-alpine
    container_name: postgres-account
    environment:
      POSTGRES_DB: account_db
      POSTGRES_USER: account_user
      POSTGRES_PASSWORD: account_password
    ports:
      - '5433:5432'
    volumes:
      - account_db_volume:/var/lib/postgresql/data
    networks:
      - microservices
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U account_user -d account_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL for Catalog Service
  postgres-catalog:
    image: postgres:15-alpine
    container_name: postgres-catalog
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_password
    ports:
      - '5434:5432'
    volumes:
      - catalog_db_volume:/var/lib/postgresql/data
    networks:
      - microservices
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U catalog_user -d catalog_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL for Order Service
  postgres-order:
    image: postgres:15-alpine
    container_name: postgres-order
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_password
    ports:
      - '5435:5432'
    volumes:
      - order_db_volume:/var/lib/postgresql/data
    networks:
      - microservices
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U order_user -d order_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL for Payment Service
  postgres-payment:
    image: postgres:15-alpine
    container_name: postgres-payment
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_password
    ports:
      - '5436:5432'
    volumes:
      - payment_db_volume:/var/lib/postgresql/data
    networks:
      - microservices
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U payment_user -d payment_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL for Report Service
  postgres-report:
    image: postgres:15-alpine
    container_name: postgres-report
    environment:
      POSTGRES_DB: report_db
      POSTGRES_USER: report_user
      POSTGRES_PASSWORD: report_password
    ports:
      - '5437:5432'
    volumes:
      - report_db_volume:/var/lib/postgresql/data
    networks:
      - microservices
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U report_user -d report_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL for Notification Service
  postgres-notification:
    image: postgres:15-alpine
    container_name: postgres-notification
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: notification_password
    ports:
      - '5438:5432'
    volumes:
      - notification_db_volume:/var/lib/postgresql/data
    networks:
      - microservices
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U notification_user -d notification_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== MESSAGE BROKER ====================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - '5672:5672'      # AMQP port
      - '15672:15672'    # Management UI port
    volumes:
      - rabbitmq_volume:/var/lib/rabbitmq
    networks:
      - microservices
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== CACHE ====================
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - '6379:6379'
    volumes:
      - redis_volume:/data
    networks:
      - microservices
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== API GATEWAY ====================
  traefik:
    image: traefik:latest
    container_name: traefik
    command:
      - '--api.insecure=true'
      - '--providers.docker=true'
      - '--providers.docker.exposedbydefault=false'
      - '--entrypoints.web.address=:80'
    ports:
      - '80:80'       # HTTP
      - '8080:8080'   # Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik/traefik.yml:/traefik.yml:ro
    networks:
      - microservices
    depends_on:
      - auth-service
      - account-service
      - catalog-service
      - cart-service
      - order-service
      - payment-service
      - report-service
      - notification-service

  # ==================== MICROSERVICES ====================
  # Auth Service
  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: Dockerfile.dev
    container_name: auth-service
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: 'postgresql://auth_user:auth_password@postgres-auth:5432/auth_db'
      RABBITMQ_URL: 'amqp://guest:guest@rabbitmq:5672'
      JWT_SECRET: 'dev-secret-key-please-change-in-production'
      JWT_PUBLIC_KEY: 'dev-public-key'
    ports:
      - '3001:3001'
    depends_on:
      postgres-auth:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.auth.rule=PathPrefix(`/api/auth`)'
      - 'traefik.http.services.auth.loadbalancer.server.port=3001'

  # Account Service
  account-service:
    build:
      context: ../services/account-service
      dockerfile: Dockerfile.dev
    container_name: account-service
    environment:
      NODE_ENV: development
      PORT: 3002
      DATABASE_URL: 'postgresql://account_user:account_password@postgres-account:5432/account_db'
      RABBITMQ_URL: 'amqp://guest:guest@rabbitmq:5672'
    ports:
      - '3002:3002'
    depends_on:
      postgres-account:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.account.rule=PathPrefix(`/api/account`)'
      - 'traefik.http.services.account.loadbalancer.server.port=3002'

  # Catalog Service
  catalog-service:
    build:
      context: ../services/catalog-service
      dockerfile: Dockerfile.dev
    container_name: catalog-service
    environment:
      NODE_ENV: development
      PORT: 3003
      DATABASE_URL: 'postgresql://catalog_user:catalog_password@postgres-catalog:5432/catalog_db'
      RABBITMQ_URL: 'amqp://guest:guest@rabbitmq:5672'
      REDIS_URL: 'redis://redis:6379'
    ports:
      - '3003:3003'
    depends_on:
      postgres-catalog:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - microservices
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.catalog.rule=PathPrefix(`/api/products`, `/api/categories`, `/api/reviews`)'
      - 'traefik.http.services.catalog.loadbalancer.server.port=3003'

  # Cart Service
  cart-service:
    build:
      context: ../services/cart-service
      dockerfile: Dockerfile.dev
    container_name: cart-service
    environment:
      NODE_ENV: development
      PORT: 3004
      REDIS_URL: 'redis://redis:6379'
      RABBITMQ_URL: 'amqp://guest:guest@rabbitmq:5672'
    ports:
      - '3004:3004'
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.cart.rule=PathPrefix(`/api/cart`)'
      - 'traefik.http.services.cart.loadbalancer.server.port=3004'

  # Order Service
  order-service:
    build:
      context: ../services/order-service
      dockerfile: Dockerfile.dev
    container_name: order-service
    environment:
      NODE_ENV: development
      PORT: 3005
      DATABASE_URL: 'postgresql://order_user:order_password@postgres-order:5432/order_db'
      RABBITMQ_URL: 'amqp://guest:guest@rabbitmq:5672'
    ports:
      - '3005:3005'
    depends_on:
      postgres-order:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.order.rule=PathPrefix(`/api/orders`)'
      - 'traefik.http.services.order.loadbalancer.server.port=3005'

  # Payment Service
  payment-service:
    build:
      context: ../services/payment-service
      dockerfile: Dockerfile.dev
    container_name: payment-service
    environment:
      NODE_ENV: development
      PORT: 3006
      DATABASE_URL: 'postgresql://payment_user:payment_password@postgres-payment:5432/payment_db'
      RABBITMQ_URL: 'amqp://guest:guest@rabbitmq:5672'
    ports:
      - '3006:3006'
    depends_on:
      postgres-payment:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.payment.rule=PathPrefix(`/api/payments`)'
      - 'traefik.http.services.payment.loadbalancer.server.port=3006'

  # Report Service
  report-service:
    build:
      context: ../services/report-service
      dockerfile: Dockerfile.dev
    container_name: report-service
    environment:
      NODE_ENV: development
      PORT: 3007
      DATABASE_URL: 'postgresql://report_user:report_password@postgres-report:5432/report_db'
      RABBITMQ_URL: 'amqp://guest:guest@rabbitmq:5672'
    ports:
      - '3007:3007'
    depends_on:
      postgres-report:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.report.rule=PathPrefix(`/api/reports`)'
      - 'traefik.http.services.report.loadbalancer.server.port=3007'

  # Notification Service
  notification-service:
    build:
      context: ../services/notification-service
      dockerfile: Dockerfile.dev
    container_name: notification-service
    environment:
      NODE_ENV: development
      PORT: 3008
      DATABASE_URL: 'postgresql://notification_user:notification_password@postgres-notification:5432/notification_db'
      RABBITMQ_URL: 'amqp://guest:guest@rabbitmq:5672'
    ports:
      - '3008:3008'
    depends_on:
      postgres-notification:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.notification.rule=PathPrefix(`/api/notifications`)'
      - 'traefik.http.services.notification.loadbalancer.server.port=3008'

volumes:
  auth_db_volume:
  account_db_volume:
  catalog_db_volume:
  order_db_volume:
  payment_db_volume:
  report_db_volume:
  notification_db_volume:
  rabbitmq_volume:
  redis_volume:

networks:
  microservices:
    driver: bridge
